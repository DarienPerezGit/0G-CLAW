services:
  agent:
    build: .
    env_file: .env
    environment:
      # LocalMemoryAdapter writes to `${HOME}/.0g-claw`. Pinning HOME to /app
      # makes that resolve to /app/.0g-claw, which is the volume mount below.
      - HOME=/app
    volumes:
      # LocalMemoryAdapter persists session/history data across container restarts.
      # In a demo scenario this is the "same machine" guarantee before 0G is wired up.
      - ./data:/app/.0g-claw
    restart: unless-stopped
