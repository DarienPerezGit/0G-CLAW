<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="0G-Claw logo">
  <defs>
    <linearGradient id="claw-grad-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#b794f6"/>
    </linearGradient>
    <linearGradient id="bg-tint-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b794f6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="word-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f4f5f7"/>
      <stop offset="100%" stop-color="#9ca0aa"/>
    </linearGradient>
  </defs>

  <!-- Icon on the left, 56x56, vertically centered -->
  <g transform="translate(12 12)">
    <rect width="56" height="56" rx="12" fill="#0d0d10"/>
    <rect width="56" height="56" rx="12" fill="url(#bg-tint-b)"/>
    <rect x="0.5" y="0.5" width="55" height="55" rx="11.5" fill="none" stroke="#1d1d24" stroke-width="1"/>
    <g stroke="url(#claw-grad-b)" stroke-linecap="round" fill="none" transform="scale(0.875)">
      <path d="M 18 46 L 38 18" stroke-width="6"/>
      <path d="M 26 50 L 46 22" stroke-width="5"/>
      <path d="M 34 54 L 52 28" stroke-width="4"/>
    </g>
  </g>

  <!-- Wordmark on the right -->
  <text x="84" y="52"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="34"
        font-weight="800"
        letter-spacing="-1.2"
        fill="url(#word-grad)">0G-CLAW</text>

  <!-- Tagline below wordmark -->
  <text x="84" y="68"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="9"
        font-weight="500"
        letter-spacing="2"
        fill="#5c6068">SOVEREIGN AGENTS · 0G STACK</text>
</svg>
