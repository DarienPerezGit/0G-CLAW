<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="0G-Claw logo">
  <defs>
    <linearGradient id="claw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#b794f6"/>
    </linearGradient>
    <linearGradient id="bg-tint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b794f6" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded square base -->
  <rect width="64" height="64" rx="14" fill="#0d0d10"/>
  <!-- Subtle gradient tint over the dark base -->
  <rect width="64" height="64" rx="14" fill="url(#bg-tint)"/>
  <!-- Border -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#1d1d24" stroke-width="1"/>
  <!-- Three diagonal claw slashes, top-right to bottom-left, decreasing thickness -->
  <g stroke="url(#claw-grad)" stroke-linecap="round" fill="none">
    <path d="M 18 46 L 38 18" stroke-width="6"/>
    <path d="M 26 50 L 46 22" stroke-width="5"/>
    <path d="M 34 54 L 52 28" stroke-width="4"/>
  </g>
</svg>
